# ─────────────────────────────────────────────────────────────────────────────
# Meet AI — Production Compose Override
#
# Extends docker-compose.yml with production-grade settings:
#   - Standalone Next.js build (runner stage, not dev)
#   - Build-time injection of NEXT_PUBLIC_* vars
#   - No source bind-mounts
#   - Restart always
#   - Resource limits (tune to your instance size)
#   - No Inngest dev server (production events go to Inngest Cloud)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env.prod up -d
#
# Required env vars (see .env.example):
#   All runtime vars from .env.example
#   INNGEST_SIGNING_KEY   — from Inngest Cloud dashboard
#   INNGEST_EVENT_KEY     — from Inngest Cloud dashboard
#
# To build the production image separately:
#   docker build \
#     --build-arg NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL \
#     --build-arg NEXT_PUBLIC_STREAM_VIDEO_API_KEY=$NEXT_PUBLIC_STREAM_VIDEO_API_KEY \
#     --build-arg NEXT_PUBLIC_STREAM_CHAT_API_KEY=$NEXT_PUBLIC_STREAM_CHAT_API_KEY \
#     --target runner \
#     -t meet-ai:$(git rev-parse --short HEAD) .
# ─────────────────────────────────────────────────────────────────────────────

name: meet-ai-prod

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner           # production standalone stage
      args:
        # NEXT_PUBLIC_* are inlined at build time — must be known here
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
        NEXT_PUBLIC_STREAM_VIDEO_API_KEY: "${NEXT_PUBLIC_STREAM_VIDEO_API_KEY}"
        NEXT_PUBLIC_STREAM_CHAT_API_KEY: "${NEXT_PUBLIC_STREAM_CHAT_API_KEY}"
    image: meet-ai:${IMAGE_TAG:-latest}
    volumes: []              # no source bind-mounts in production
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      # Inngest Cloud — no local dev server
      INNGEST_DEV: "0"
    ports:
      - "${PORT:-3000}:3000"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Inngest Dev Server is NOT included here.
  # In production, the app connects directly to Inngest Cloud via:
  #   INNGEST_SIGNING_KEY and INNGEST_EVENT_KEY in your env.prod file.
  # No additional service is required.
