# ─────────────────────────────────────────────────────────────────────────────
# Meet AI — Local Development Stack
#
# Services
#   app      Next.js dev server with hot reload (bind-mounted source)
#   inngest  Inngest Dev Server — durable step-function runtime for local use
#
# Usage:
#   cp .env.example .env.local
#   # fill in all values in .env.local
#   docker compose up
#
# Hot reload on Windows/macOS with Docker Desktop:
#   If file-watching is unreliable, add to .env.local:
#     WATCHPACK_POLLING=true
#
# Inngest dashboard:  http://localhost:8288
# App:                http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────

name: meet-ai-dev

services:

  # ── Next.js application (development) ──────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev              # hot-reload stage, not the production runner
    volumes:
      # Bind-mount source so edits on the host are reflected immediately
      - .:/app
      # Named volume shadows the bind-mount for node_modules so the host
      # filesystem never overwrites the container's compiled native addons
      - app_node_modules:/app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      # Route Inngest event sends to the local dev server, not Inngest Cloud
      INNGEST_DEV: "1"
      INNGEST_BASE_URL: "http://inngest:8288"
    depends_on:
      inngest:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Inngest Dev Server ──────────────────────────────────────────────────────
  # Provides the durable step-function execution environment locally.
  # The SDK registers its functions at /api/inngest on first HTTP request.
  # In production, replace this with Inngest Cloud (no container required).
  inngest:
    image: inngest/inngest:latest
    command: >
      inngest dev
        --host 0.0.0.0
        --port 8288
        --no-discovery
        --sdk-url http://app:3000/api/inngest
    ports:
      - "8288:8288"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8288/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  # Persists node_modules across container restarts without re-installing
  app_node_modules:
    driver: local
